name: 16 - Woking with Environments
run-name: 16 - Working with Environments | env - ${{ inputs.target-env }}

on: 
    workflow_dispatch:
        inputs:
            target-env:
                type: environment
                default: staging

jobs:
    echo:
        runs-on: ubuntu-latest
        environment: ${{ inputs.target-env }}
        env:
            my-env-value: ${{ vars.MY_ENV_VALUE || 'defalult value' }}
        steps:
            - name: Echo vars
              run: |
                echo "Env variable: ${{ env.my-env-value }}"
