name: 17 - 3 - Custom Actions - Docker

on: 
  workflow_dispatch:
    inputs:
      url:
        type: choice
        options:
          - 'https://www.google.com'
          - 'https://www.invalid-aidfsdfsf.com'
          - 'invalid-aisdlfksf'
      max_trials:
        description: maximum trials until action fails
        default: '10'
        required: false
      delay:
        description: Delay in seconds between trials.
        default: '5'
        required: false
      

jobs:
  dependency-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ping URL
        id: ping-url
        uses: ./.github/actions/docker-ping-url
        with:
          url: ${{ inputs.url }}
          max_trials: ${{ inputs.max_trials }}
          delay: ${{ inputs.delay }}
      - name: Print output from ping url
        run: |
          echo "URL reachable: ${{ steps.ping-url.outputs.url-reachable }}"
          
        
       